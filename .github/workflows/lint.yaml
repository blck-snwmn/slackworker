name: Biome

on:
  push:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      - uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: true
      - name: biome
        run: |
          pnpm biome ci .